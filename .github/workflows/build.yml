name: 构建 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 安装依赖
        run: npm install

      - name: 初始化 Android 平台
        run: npx cap add android

      - name: 同步文件到 Android
        run: npx cap sync android

      - name: 赋予 gradlew 执行权限
        run: chmod +x android/gradlew

      - name: 构建 Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --warning-mode=none

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: budget-tracker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
