name: 构建 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 验证 www 目录完整性
        run: |
          test -f www/index.html    || (echo "::error::缺少 www/index.html" && exit 1)
          test -f www/manifest.json || (echo "::error::缺少 www/manifest.json" && exit 1)
          test -f www/sw.js         || (echo "::error::缺少 www/sw.js" && exit 1)
          test -f www/icons/icon-192.png || (echo "::error::缺少 www/icons/icon-192.png" && exit 1)
          test -f www/icons/icon-512.png || (echo "::error::缺少 www/icons/icon-512.png" && exit 1)

      - name: 安装依赖
        run: npm install

      - name: 初始化 Android 平台
        run: npx cap add android

      - name: 添加 Android 文件权限和桥接
        run: bash patch-android.sh

      - name: 同步文件到 Android
        run: npx cap sync android

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 赋予 gradlew 执行权限
        run: chmod +x android/gradlew

      - name: 构建 Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --warning-mode=none

      - name: 签名 APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | tr -d '\n' | base64 -d > budget-tracker.jks
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $BUILD_TOOLS/apksigner sign \
            --ks budget-tracker.jks \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --key-pass pass:$KEY_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --out android/app/build/outputs/apk/debug/app-signed.apk \
            android/app/build/outputs/apk/debug/app-debug.apk

      - name: 获取版本号
        id: version
        run: echo "ver=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: 上传 APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: budget-tracker-apk
          path: |
            android/app/build/outputs/apk/debug/app-signed.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}-build${{ github.run_number }}
          name: "预算追踪 v${{ steps.version.outputs.ver }} (build ${{ github.run_number }})"
          body: |
            自动构建发布

            - 提交：${{ github.sha }}
            - 分支：${{ github.ref_name }}
          files: android/app/build/outputs/apk/debug/app-signed.apk
          make_latest: true
