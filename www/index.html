<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>预算 & 存款追踪</title>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="预算追踪"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeede8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --radius:8px;--radius-lg:12px;
  --ok:#0F6E56;--warn:#BA7517;--over:#A32D2D;
  --ok-bg:#E1F5EE;--warn-bg:#FAEEDA;--over-bg:#FCEBEB;
  --ok-border:#1D9E75;--warn-border:#BA7517;--over-border:#A32D2D;
  --purple:#3C3489;--purple-light:#EEEDFE;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
    --ok-bg:#085041;--warn-bg:#412402;--over-bg:#501313;
    --purple:#7F77DD;--purple-light:#26215C;
  }
}
body{background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--text);min-height:100vh;}
.app{max-width:480px;margin:0 auto;background:var(--bg3);min-height:100vh;padding-bottom:40px;}
.header{background:var(--bg);border-bottom:0.5px solid var(--border);padding:16px 20px 0;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.app-title{font-size:18px;font-weight:500;}
.month-nav{display:flex;align-items:center;gap:8px;}
.month-nav button{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:4px 12px;cursor:pointer;color:var(--text);font-size:13px;}
.month-nav span{font-size:13px;color:var(--text2);min-width:96px;text-align:center;}
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:none;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text2);border:none;border-bottom:2px solid transparent;background:none;font-weight:400;white-space:nowrap;}
.tab.active{color:var(--text);border-bottom:2px solid var(--text);font-weight:500;}
.section{display:none;padding:16px 16px 0;}
.section.active{display:block;}
.budget-overview{background:var(--bg);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px;}
.overview-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.overview-spent{font-size:26px;font-weight:500;color:var(--text);}
.overview-budget{font-size:13px;color:var(--text2);}
.overview-bar-wrap{height:8px;background:var(--bg3);border-radius:4px;margin-bottom:8px;overflow:hidden;}
.overview-bar{height:100%;border-radius:4px;transition:width 0.4s ease;max-width:100%;}
.bar-ok{background:#1D9E75;}.bar-warn{background:#BA7517;}.bar-over{background:#A32D2D;}
.overview-row{display:flex;justify-content:space-between;align-items:center;}
.overview-remain{font-size:13px;color:var(--text2);}
.overview-remain strong{color:var(--text);}
.overview-pct{font-size:13px;font-weight:500;}
.pct-ok{color:var(--ok);}.pct-warn{color:var(--warn);}.pct-over{color:var(--over);}
.record-panel{background:var(--bg);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px;}
.panel-label{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:10px;}
.frow{display:flex;gap:8px;flex-wrap:wrap;}
select,input[type=text],input[type=number]{font-size:14px;padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none;}
select:focus,input:focus{border-color:var(--purple);}
.frow select{flex:1;min-width:120px;}
.frow input[type=number]{width:110px;flex:none;}
.frow input[type=text]{flex:1;min-width:100px;}
.btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);padding:9px 18px;font-size:14px;cursor:pointer;font-weight:500;white-space:nowrap;}
.btn:active{opacity:0.8;}
.btn-sm{font-size:12px;padding:5px 11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;cursor:pointer;color:var(--text2);}
.btn-sm:active{background:var(--bg2);}
.btn-outline{font-size:14px;padding:12px 14px;border:0.5px solid var(--border2);border-radius:var(--radius-lg);background:var(--bg);cursor:pointer;color:var(--text);width:100%;text-align:left;display:flex;align-items:center;gap:12px;}
.btn-outline:active{background:var(--bg2);}
.btn-outline .ico{font-size:18px;width:24px;text-align:center;flex:none;}
.btn-outline .lbl{display:flex;flex-direction:column;gap:2px;}
.btn-outline .lbl-title{font-size:14px;font-weight:500;}
.btn-outline .lbl-sub{font-size:12px;color:var(--text2);}
.cats{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.cat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;}
.cat.warn-c{border-color:var(--warn-border);background:var(--warn-bg);}
.cat.over-c{border-color:var(--over-border);background:var(--over-bg);}
.cat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cat-name{font-size:14px;font-weight:500;}
.cat-amt{font-size:13px;color:var(--text2);}
.cat-amt strong{color:var(--text);}
.pbar{height:5px;background:var(--bg3);border-radius:3px;margin-bottom:7px;overflow:hidden;}
.pfill{height:100%;border-radius:3px;transition:width 0.3s;max-width:100%;}
.p-ok{background:#1D9E75;}.p-warn{background:#BA7517;}.p-over{background:#A32D2D;}
.cat-bot{display:flex;justify-content:space-between;align-items:center;}
.s-ok{font-size:12px;color:var(--ok);}
.s-warn{font-size:12px;color:var(--warn);}
.s-over{font-size:12px;color:var(--over);}
.cat-acts{display:flex;gap:6px;}
.divider{border-top:0.5px solid var(--border);margin:14px 0;}
.manage-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.manage-row span{font-size:13px;color:var(--text2);font-weight:500;}
.addform{display:none;background:var(--bg);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;}
.addform.open{display:block;}
.empty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center;}
.records-filter{background:var(--bg);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:12px;display:flex;gap:8px;align-items:center;}
.records-filter select{flex:1;font-size:13px;padding:7px 10px;}
.records-count{font-size:12px;color:var(--text3);white-space:nowrap;}
.record-group{margin-bottom:16px;}
.record-group-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px;padding:0 2px;}
.record-item{background:var(--bg);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.record-item-l{display:flex;flex-direction:column;gap:3px;flex:1;}
.record-cat{font-size:14px;font-weight:500;}
.record-meta{font-size:12px;color:var(--text2);}
.record-time{font-size:11px;color:var(--text3);}
.record-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.tag{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);}
.record-item-r{display:flex;align-items:center;gap:10px;flex:none;}
.record-amt{font-size:14px;font-weight:500;}
.record-amt.over-amt{color:var(--over);}
.record-del{font-size:13px;color:var(--text3);cursor:pointer;padding:2px 8px;border-radius:4px;}
.record-del:active{background:var(--bg2);}
.goal-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;}
.goal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.goal-name{font-size:15px;font-weight:500;}
.goal-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.goal-pct{font-size:22px;font-weight:500;color:var(--ok);}
.goal-amounts{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;}
.goal-amounts strong{color:var(--text);}
.goal-bot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.goal-eta{font-size:12px;color:var(--text2);}
.goal-acts{display:flex;gap:6px;}
.deposit-panel{background:var(--bg);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px;}
.mine-section{margin-bottom:20px;}
.mine-section-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.5px;margin-bottom:8px;padding:0 2px;}
.mine-card{background:var(--bg);border-radius:var(--radius-lg);overflow:hidden;border:0.5px solid var(--border);}
.mine-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--border);}
.mine-row:last-child{border-bottom:none;}
.mine-row-left{display:flex;flex-direction:column;gap:2px;}
.mine-row-title{font-size:14px;color:var(--text);}
.mine-row-sub{font-size:12px;color:var(--text2);}
.mine-row-arrow{color:var(--text3);font-size:14px;}
.mine-row.tappable{cursor:pointer;}
.mine-row.tappable:active{background:var(--bg2);}
.mine-row.danger .mine-row-title{color:var(--over);}
.backup-sub-panel{display:none;background:var(--bg2);padding:12px 16px;border-top:0.5px solid var(--border);}
.backup-sub-panel.open{display:block;}
.toast-wrap{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:999;}
.toast{background:var(--purple);color:var(--purple-light);padding:10px 20px;border-radius:var(--radius-lg);font-size:13px;opacity:0;transition:opacity 0.25s;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">预算 & 存款</div>
      <div class="month-nav">
        <button onclick="chMonth(-1)">‹</button>
        <span id="mlabel"></span>
        <button onclick="chMonth(1)">›</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('budget',this)">月度预算</button>
      <button class="tab" onclick="switchTab('records',this)">消费记录</button>
      <button class="tab" onclick="switchTab('savings',this)">存款目标</button>
      <button class="tab" onclick="switchTab('mine',this)">我的</button>
    </div>
  </div>

  <!-- 月度预算 -->
  <div id="tab-budget" class="section active">
    <div style="height:14px;"></div>
    <div class="budget-overview">
      <div class="overview-top">
        <div class="overview-spent" id="ov-spent">¥0</div>
        <div class="overview-budget" id="ov-budget">/ ¥0 本月预算</div>
      </div>
      <div class="overview-bar-wrap">
        <div class="overview-bar bar-ok" id="ov-bar" style="width:0%"></div>
      </div>
      <div class="overview-row">
        <div class="overview-remain" id="ov-remain">剩余 <strong>¥0</strong></div>
        <div class="overview-pct pct-ok" id="ov-pct">0%</div>
      </div>
    </div>
    <div class="record-panel">
      <div class="panel-label">快速记录</div>
      <div class="frow" style="margin-bottom:8px;">
        <select id="exp-cat"></select>
        <input type="number" id="exp-amt" placeholder="金额 ¥" min="0" step="0.01"/>
      </div>
      <div class="frow">
        <input type="text" id="exp-note" placeholder="备注（如：买了昂贵水果）"/>
        <button class="btn" onclick="addExp()">记录</button>
      </div>
    </div>
    <div class="cats" id="cats-list"></div>

  </div>

  <!-- 消费记录 -->
  <div id="tab-records" class="section">
    <div style="height:14px;"></div>
    <div class="records-filter">
      <select id="rec-filter-cat" onchange="renderRecords()" style="flex:1;font-size:13px;padding:7px 10px;">
        <option value="">全部分类</option>
      </select>
      <select id="rec-filter-month" onchange="renderRecords()" style="flex:1;font-size:13px;padding:7px 10px;"></select>
      <span class="records-count" id="rec-count"></span>
    </div>
    <div id="records-list"></div>
  </div>

  <!-- 存款目标 -->
  <div id="tab-savings" class="section">
    <div style="height:14px;"></div>
    <div class="deposit-panel">
      <div class="panel-label">存入资金</div>
      <div class="frow" style="margin-bottom:8px;">
        <select id="dep-goal" style="flex:1;"></select>
        <input type="number" id="dep-amt" placeholder="存入金额 ¥" style="width:130px;flex:none;"/>
      </div>
      <div class="frow">
        <input type="text" id="dep-note" placeholder="备注（可选）" style="flex:1;"/>
        <button class="btn" onclick="addDeposit()">存入</button>
      </div>
    </div>
    <div id="goals-list"></div>
    <div class="divider"></div>
    <div class="manage-row">
      <span>新增存款目标</span>
      <button class="btn-sm" onclick="toggleForm('addgoal-form')">+ 新增</button>
    </div>
    <div class="addform" id="addgoal-form">
      <div class="frow" style="margin-bottom:8px;">
        <input type="text" id="ng-name" placeholder="目标名称（如：电子产品基金）" style="flex:1;"/>
      </div>
      <div class="frow">
        <input type="number" id="ng-target" placeholder="目标金额 ¥" style="flex:1;"/>
        <input type="number" id="ng-monthly" placeholder="每月存入 ¥" style="flex:1;"/>
        <button class="btn" onclick="addGoal()">添加</button>
      </div>
    </div>
  </div>

  <!-- 我的 -->
  <div id="tab-mine" class="section">
    <div style="height:14px;"></div>
    <div class="mine-section">
      <div class="mine-section-label">偏好设置</div>
      <div class="mine-card">
        <div class="mine-row">
          <div class="mine-row-left">
            <div class="mine-row-title">预算模式</div>
            <div class="mine-row-sub" id="budget-mode-sub">开启后显示限额进度条和预警</div>
          </div>
          <div style="flex:none;">
            <label style="display:flex;align-items:center;cursor:pointer;">
              <input type="checkbox" id="budget-mode-toggle" onchange="toggleBudgetMode(this.checked)" style="width:40px;height:24px;cursor:pointer;accent-color:var(--purple);"/>
            </label>
          </div>
        </div>
        <div class="mine-row">
          <div class="mine-row-left">
            <div class="mine-row-title">账单结算日</div>
            <div class="mine-row-sub" id="billing-day-sub">每月 1 日自动开始新周期</div>
          </div>
          <div style="display:flex;align-items:center;gap:4px;flex:none;">
            <input type="number" id="billing-day-input" min="1" max="28" value="1"
              style="width:52px;text-align:center;padding:6px 8px;font-size:14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);"
              onchange="setBillingDay(this.value)"/>
            <span style="font-size:13px;color:var(--text2);">日</span>
          </div>
        </div>
      </div>
    </div>

    <div class="mine-section">
      <div class="mine-section-label">数据</div>
      <div class="mine-card">
        <div class="mine-row">
          <div class="mine-row-left">
            <div class="mine-row-title">数据概览</div>
            <div class="mine-row-sub" id="mine-stats">加载中…</div>
          </div>
        </div>
        <div class="mine-row tappable" onclick="toggleBudgetManage()" id="budget-manage-row" style="display:none;">
          <div class="mine-row-left">
            <div class="mine-row-title">管理分类预算</div>
            <div class="mine-row-sub">修改各分类的月度限额</div>
          </div>
          <div class="mine-row-arrow">›</div>
        </div>
        <div class="backup-sub-panel" id="budget-manage-panel">
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">直接修改金额即可，实时保存</div>
          <div id="bm-list"></div>
        </div>
        <div class="mine-row tappable" onclick="toggleCatManage()">
          <div class="mine-row-left">
            <div class="mine-row-title">管理分类</div>
            <div class="mine-row-sub">新增或删除消费分类</div>
          </div>
          <div class="mine-row-arrow">›</div>
        </div>
        <div class="backup-sub-panel" id="cat-manage-panel">
          <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">删除分类不会删除消费记录，记录将标记为未分类</div>
          <div id="cat-list"></div>
          <div style="margin-top:10px;">
            <button class="btn-sm" onclick="toggleForm('addcat-form-mine')">+ 新增分类</button>
          </div>
          <div class="addform" id="addcat-form-mine" style="margin-top:8px;padding:0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:12px;color:var(--text2);font-weight:500;">新增分类</span>
              <button class="btn-sm" onclick="toggleForm('addcat-form-mine')">✕ 关闭</button>
            </div>
            <div class="frow" style="margin-bottom:8px;">
              <input type="text" id="nc-icon" placeholder="图标🛒" style="width:64px;flex:none;"/>
              <input type="text" id="nc-name" placeholder="分类名称" style="flex:1;"/>
            </div>
            <div class="frow">
              <input type="number" id="nc-budget" placeholder="月限额 ¥" style="flex:1;"/>
              <button class="btn" onclick="addCat()">添加</button>
            </div>
          </div>
        </div>
        <div class="mine-row tappable" onclick="toggleBackupPanel()">
          <div class="mine-row-left">
            <div class="mine-row-title">备份与恢复</div>
            <div class="mine-row-sub" id="mine-lastbackup">上次备份：从未</div>
          </div>
          <div class="mine-row-arrow">›</div>
        </div>
        <div class="backup-sub-panel" id="backup-sub-panel">
          <div class="frow" style="flex-direction:column;gap:8px;">
            <button class="btn-outline" onclick="exportBackup()">
              <span class="ico">💾</span>
              <span class="lbl"><span class="lbl-title">导出备份</span><span class="lbl-sub">保存 JSON 文件，升级前务必先备份</span></span>
            </button>
            <button class="btn-outline" onclick="document.getElementById('import-input').click()">
              <span class="ico">📂</span>
              <span class="lbl"><span class="lbl-title">从文件恢复</span><span class="lbl-sub">导入之前导出的 JSON 备份</span></span>
            </button>
            <input type="file" id="import-input" accept=".json" style="display:none;" onchange="importBackup(event)"/>
          </div>
        </div>
      </div>
    </div>
    <div class="mine-section">
      <div class="mine-section-label">关于</div>
      <div class="mine-card" style="margin-bottom:20px;">
        <div class="mine-row">
          <div class="mine-row-left">
            <div class="mine-row-title">当前版本</div>
            <div class="mine-row-sub">v1.4.0</div>
          </div>
          <div class="mine-row-right" style="font-size:11px;color:var(--text3);">升级前请先导出备份</div>
        </div>
      </div>
      <div class="mine-section-label">其他</div>
      <div class="mine-card">
        <div class="mine-row tappable danger" onclick="clearAllData()">
          <div class="mine-row-left">
            <div class="mine-row-title">清空所有数据</div>
            <div class="mine-row-sub">删除全部记录，不可撤销</div>
          </div>
          <div class="mine-row-arrow">›</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
let now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
const SK='budget_tracker_v1';

let S={
  budgetMode:true,
  billingDay:1,
  cats:[
    {id:1,icon:'🛒',name:'买菜',budget:800},
    {id:2,icon:'🍿',name:'零食',budget:200},
    {id:3,icon:'🍎',name:'水果',budget:300},
    {id:4,icon:'👕',name:'服饰',budget:500},
    {id:5,icon:'🍜',name:'外卖/餐厅',budget:600},
    {id:6,icon:'🎮',name:'娱乐/网购',budget:300},
    {id:7,icon:'🔋',name:'零散小消费',budget:100},
  ],
  txns:[],
  goals:[{id:1,name:'电子产品基金',target:2000,monthly:500,deposits:[]}],
  nid:100,ncid:10,ngid:10
};

function cycleStart(y,m){return new Date(y,m,S.billingDay||1).getTime();}
function cycleEnd(y,m){return new Date(y,m+1,S.billingDay||1).getTime();}
function tsToCycle(ts){
  const d=new Date(ts),bd=S.billingDay||1;
  if(d.getDate()>=bd)return{y:d.getFullYear(),m:d.getMonth()};
  const p=new Date(d.getFullYear(),d.getMonth()-1,1);
  return{y:p.getFullYear(),m:p.getMonth()};
}
function todayCycle(){return tsToCycle(Date.now());}
function cycleLabel(y,m){
  const bd=S.billingDay||1;
  if(bd===1)return y+'年 '+MONTHS[m];
  const s=new Date(y,m,bd),e=new Date(y,m+1,bd-1);
  return`${s.getMonth()+1}/${s.getDate()} - ${e.getMonth()+1}/${e.getDate()}`;
}

function save(){try{localStorage.setItem(SK,JSON.stringify({S,cy,cm}));}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem(SK);
    if(d){const p=JSON.parse(d);S=p.S;cy=p.cy;cm=p.cm;}
  }catch(e){}
  if(!S.billingDay)S.billingDay=1;
  const tc=todayCycle();
  if(cycleStart(tc.y,tc.m)>cycleStart(cy,cm)){cy=tc.y;cm=tc.m;}
}

function mTxns(){
  const s=cycleStart(cy,cm),e=cycleEnd(cy,cm);
  return S.txns.filter(t=>t.ts?(t.ts>=s&&t.ts<e):(t.y===cy&&t.m===cm));
}
function spent(cid){return mTxns().filter(t=>t.cid===cid).reduce((s,t)=>s+t.amt,0);}
function totalSaved(gid){const g=S.goals.find(x=>x.id===gid);return g?g.deposits.reduce((s,d)=>s+d.amt,0):0;}

function fmtTime(ts){
  if(!ts)return '';
  const d=new Date(ts);
  const h=String(d.getHours()).padStart(2,'0');
  const mi=String(d.getMinutes()).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()} ${h}:${mi}`;
}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  btn.classList.add('active');
  render();
}

function chMonth(d){
  cm+=d;
  if(cm<0){cm=11;cy--;}
  if(cm>11){cm=0;cy++;}
  save();render();
}

function toggleForm(id){document.getElementById(id).classList.toggle('open');}
function toggleBackupPanel(){document.getElementById('backup-sub-panel').classList.toggle('open');}

function render(){
  document.getElementById('mlabel').textContent=cycleLabel(cy,cm);
  renderOverview();
  renderCats();
  renderCatSelect();
  renderRecords();
  renderGoals();
  renderGoalSelect();

}

function renderOverview(){
  const tb=S.cats.reduce((s,c)=>s+c.budget,0);
  const ts=S.cats.reduce((s,c)=>s+spent(c.id),0);
  const rem=tb-ts;
  const pct=tb>0?ts/tb:0;
  const pctRound=Math.round(pct*100);
  const isOver=pct>=1,isWarn=pct>=0.8&&!isOver;
  const barCls=isOver?'bar-over':isWarn?'bar-warn':'bar-ok';
  const pctCls=isOver?'pct-over':isWarn?'pct-warn':'pct-ok';
  document.getElementById('ov-spent').textContent='¥'+Math.round(ts).toLocaleString();
  const periodWord=(S.billingDay||1)===1?'月':'期';
  document.getElementById('ov-budget').textContent=S.budgetMode!==false?'/ ¥'+tb.toLocaleString()+' 本'+periodWord+'预算':'本'+periodWord+'消费';
  const bar=document.getElementById('ov-bar');
  bar.style.width=Math.min(100,pctRound)+'%';
  bar.className='overview-bar '+barCls;
  const remText=rem<0?`超出 <strong>¥${Math.round(-rem).toLocaleString()}</strong>`:`剩余 <strong>¥${Math.round(rem).toLocaleString()}</strong>`;
  document.getElementById('ov-remain').innerHTML=remText;
  const pctEl=document.getElementById('ov-pct');
  pctEl.textContent=pctRound+'%';
  pctEl.className='overview-pct '+pctCls;
}

function renderCats(){
  const el=document.getElementById('cats-list');
  el.innerHTML='';
  S.cats.forEach(c=>{
    const sp=spent(c.id);
    const budgetOn=S.budgetMode!==false;
    const pct=c.budget>0?sp/c.budget:0;
    const isOver=budgetOn&&(c.budget===0?sp>0:pct>=1);
    const isWarn=budgetOn&&!isOver&&c.budget>0&&pct>=0.8;
    const bw=!budgetOn?0:c.budget===0?(sp>0?100:0):Math.min(100,Math.round(pct*100));
    const bc=isOver?'p-over':isWarn?'p-warn':'p-ok';
    const cc=isOver?'over-c':isWarn?'warn-c':'';
    const overAmt=sp-c.budget;
    const st=!budgetOn
      ?`<span class="s-ok">本${(S.billingDay||1)===1?'月':'期'}消费 ¥${Math.round(sp).toLocaleString()}</span>`
      :isOver&&c.budget===0
      ?`<span class="s-over">预算为 ¥0，已记录 ¥${Math.round(sp).toLocaleString()}</span>`
      :isOver?`<span class="s-over">超出预算 ¥${Math.round(overAmt).toLocaleString()}</span>`
      :isWarn?`<span class="s-warn">已用 ${Math.round(pct*100)}%，接近上限</span>`
      :`<span class="s-ok">已用 ${Math.round(pct*100)}%</span>`;
    const amtDisplay=budgetOn?`<strong>¥${Math.round(sp).toLocaleString()}</strong> / ¥${c.budget.toLocaleString()}`:`<strong>¥${Math.round(sp).toLocaleString()}</strong>`;
    const d=document.createElement('div');
    d.className=`cat ${cc}`;
    d.innerHTML=`<div class="cat-top"><div class="cat-name">${c.icon} ${c.name}</div><div class="cat-amt">${amtDisplay}</div></div>${budgetOn?`<div class="pbar"><div class="pfill ${bc}" style="width:${bw}%"></div></div>`:''}<div class="cat-bot"><div>${st}</div></div>`;
    el.appendChild(d);
  });
}

function renderCatSelect(){

function renderRecords(){
  const el=document.getElementById('records-list');
  if(!el)return;
  const filterCat=document.getElementById('rec-filter-cat')?.value||'';
  const filterMonth=document.getElementById('rec-filter-month')?.value||'';
  let txns=[...S.txns].reverse();
  if(filterCat)txns=txns.filter(t=>t.cid===parseInt(filterCat));
  if(filterMonth){
    const[fy,fm]=filterMonth.split('-').map(Number);
    const fs=cycleStart(fy,fm),fe=cycleEnd(fy,fm);
    txns=txns.filter(t=>t.ts?(t.ts>=fs&&t.ts<fe):(t.y===fy&&t.m===fm));
  }
  document.getElementById('rec-count').textContent=txns.length+'条';
  if(!txns.length){el.innerHTML='<div class="empty">暂无记录</div>';return;}
  const groups={};
  txns.forEach(t=>{
    const c=t.ts?tsToCycle(t.ts):{y:t.y,m:t.m};
    const key=cycleLabel(c.y,c.m);
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  el.innerHTML=Object.entries(groups).map(([label,list])=>`
    <div class="record-group">
      <div class="record-group-label">${label}</div>
      ${list.map(t=>{
        const cat=S.cats.find(c=>c.id===t.cid);
        const cn=cat?`${cat.icon} ${cat.name}`:(t.catDeleted||t.cid===0)?'📂 未分类':'已删除';
        const catBudget=cat?cat.budget:0;
        const catSpent=spent(t.cid);
        const isOverBudget=catSpent>catBudget&&catBudget>0;
        const tagsHtml=t.tags&&t.tags.length?`<div class="record-tags">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>`:'';
        const timeStr=t.ts?fmtTime(t.ts):'';
        return `<div class="record-item">
          <div class="record-item-l">
            <div class="record-cat">${cn}</div>
            <div class="record-meta">${t.note||'无备注'}</div>
            ${timeStr?`<div class="record-time">${timeStr}</div>`:''}
            ${tagsHtml}
          </div>
          <div class="record-item-r">
            <div class="record-amt${isOverBudget?' over-amt':''}">¥${t.amt.toFixed(2)}</div>
            <div class="record-del" onclick="delTxn(${t.id})">✕</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function renderRecordMonthFilter(){
  const sel=document.getElementById('rec-filter-month');
  if(!sel)return;
  const cur=sel.value;
  const cycleSet=new Set();
  S.txns.forEach(t=>{const c=t.ts?tsToCycle(t.ts):{y:t.y,m:t.m};cycleSet.add(c.y+'-'+c.m);});
  const sorted=[...cycleSet].sort((a,b)=>b.localeCompare(a));
  sel.innerHTML='<option value="">全部周期</option>'+sorted.map(k=>{
    const[y,m]=k.split('-').map(Number);
    return`<option value="${k}">${cycleLabel(y,m)}</option>`;
  }).join('');
  if(cur)sel.value=cur;
}

function renderGoals(){

    el.appendChild(d);

function setBillingDay(val){
  const n=parseInt(val);
  if(isNaN(n)||n<1||n>28){
    toast('结算日需为 1-28 之间的整数');
    const el=document.getElementById('billing-day-input');
    if(el)el.value=S.billingDay||1;
    return;
  }
  S.billingDay=n;
  const tc=todayCycle();cy=tc.y;cm=tc.m;
  save();render();renderRecordMonthFilter();
  toast(`结算日已设为每月 ${n} 日`);
}

function addExp(){
  const cid=parseInt(document.getElementById('exp-cat').value);
  const amt=parseFloat(document.getElementById('exp-amt').value);
  const note=document.getElementById('exp-note').value.trim();
  if(!cid||isNaN(amt)||amt<=0){toast('请填写金额');return;}
  const cat=S.cats.find(c=>c.id===cid);
  if(!cat)return;
  const sp=spent(cid);
  const budgetOn=S.budgetMode!==false;
  const willOver=budgetOn&&sp+amt>cat.budget;
  S.txns.push({id:S.nid++,cid,amt,note,tags:[],y:cy,m:cm,ts:Date.now()});
  document.getElementById('exp-amt').value='';
  document.getElementById('exp-note').value='';
  save();render();renderRecordMonthFilter();
  const nsp=spent(cid),p=nsp/cat.budget;
  if(willOver)toast(`「${cat.name}」已超出预算，已标记`);
  else if(p>=0.8)toast(`注意：「${cat.name}」已用 ${Math.round(p*100)}%`);
  else toast('已记录');
}

function addDeposit(){
  const gid=parseInt(document.getElementById('dep-goal').value);
  const amt=parseFloat(document.getElementById('dep-amt').value);
  const note=document.getElementById('dep-note').value.trim();
  if(!gid||isNaN(amt)||amt<=0){toast('请填写金额');return;}
  const g=S.goals.find(x=>x.id===gid);
  if(!g)return;
  g.deposits.push({id:S.nid++,amt,note,date:new Date().toLocaleDateString('zh-CN')});
  document.getElementById('dep-amt').value='';
  document.getElementById('dep-note').value='';
  save();renderGoals();renderGoalSelect();
  const saved=totalSaved(gid);
  if(saved>=g.target)toast(`恭喜！「${g.name}」目标已达成`);
  else toast(`已存入 ¥${amt}，累计 ¥${Math.round(saved).toLocaleString()}`);
}

function delCat(cid){
  const c=S.cats.find(x=>x.id===cid);if(!c)return;

function exportBackup(){
  const data={version:1,exportedAt:new Date().toISOString(),exportedAtLocal:new Date().toLocaleString('zh-CN'),state:S,cy,cm};
  const json=JSON.stringify(data,null,2);
  const fileName=`budget_backup_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  const saved=()=>{
    localStorage.setItem('budget_last_backup',new Date().toLocaleString('zh-CN'));
    renderMine();
  };
  if(window.AndroidBridge){
    const result=window.AndroidBridge.saveBackup(json,fileName);
    if(result==='ok'||result===undefined){
      saved();
    } else {
      toast('保存失败：'+result);
    }
  } else {
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=fileName;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    saved();
    toast('备份已保存');
  }
}

function importBackup(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.state||!data.state.cats){toast('文件格式不正确');return;}
      if(!confirm(`确认导入？备份时间：${data.exportedAtLocal||'未知'}，当前数据将被覆盖。`))return;
      S=data.state;
      if(data.cy)cy=data.cy;
      if(data.cm!==undefined)cm=data.cm;
      save();render();renderRecordMonthFilter();toast('数据已恢复');
    }catch(err){toast('导入失败，文件可能已损坏');}
    event.target.value='';
  };
  reader.readAsText(file);
}

function clearAllData(){
  if(!confirm('确定清空所有数据？建议先导出备份。'))return;
  S={cats:[
    {id:1,icon:'🛒',name:'买菜',budget:800},
    {id:2,icon:'🍿',name:'零食',budget:200},
    {id:3,icon:'🍎',name:'水果',budget:300},
    {id:4,icon:'👕',name:'服饰',budget:500},
    {id:5,icon:'🍜',name:'外卖/餐厅',budget:600},
    {id:6,icon:'🎮',name:'娱乐/网购',budget:300},
    {id:7,icon:'🔋',name:'零散小消费',budget:100},
  ],txns:[],goals:[{id:1,name:'电子产品基金',target:2000,monthly:500,deposits:[]}],nid:100,ncid:10,ngid:10};
  now=new Date();cy=now.getFullYear();cm=now.getMonth();
  save();render();renderRecordMonthFilter();toast('已清空所有数据');
}

function showConfirm(title, msg, onOk){
  const existing=document.getElementById('custom-confirm');
  if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.id='custom-confirm';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;justify-content:center;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0);';
  overlay.innerHTML=`<div style="background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px 20px 12px;">
    <div style="font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;">${title}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px;">${msg}</div>
    <div style="display:flex;gap:8px;">
      <button onclick="document.getElementById('custom-confirm').remove()" style="flex:1;padding:12px;border:0.5px solid var(--border);border-radius:var(--radius-lg);background:var(--bg2);font-size:14px;cursor:pointer;color:var(--text);">取消</button>
      <button id="confirm-ok-btn" style="flex:1;padding:12px;border:none;border-radius:var(--radius-lg);background:#A32D2D;font-size:14px;cursor:pointer;color:white;font-weight:500;">确认删除</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  document.getElementById('confirm-ok-btn').onclick=()=>{overlay.remove();onOk();};
}

let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
load();render();renderRecordMonthFilter();
</script>
</body>
